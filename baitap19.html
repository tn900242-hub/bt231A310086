<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài tập 19 - Memory Card Flip Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:15px;
}

.info{
    margin-bottom:15px;
    font-size:20px;
}

button{
    padding:10px 20px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin-bottom:20px;
}

button:hover{
    background:#0056b3;
}

.game-board{
    display:grid;
    grid-template-columns:repeat(4,120px);
    gap:15px;
    justify-content:center;
}

.card{
    width:120px;
    height:120px;
    perspective:1000px;
    cursor:pointer;
}

.card-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform 0.6s;
    transform-style:preserve-3d;
}

.card.flip .card-inner{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    backface-visibility:hidden;
}

.front{
    background:#007bff;
    color:white;
}

.back{
    background:white;
    border:2px solid #007bff;
    transform:rotateY(180deg);
}

.card:hover{
    transform:scale(1.05);
}

@media(max-width:600px){
    .game-board{
        grid-template-columns:repeat(2,120px);
    }
}
</style>
</head>

<body>

<h1>🎮 Memory Card Flip Game</h1>

<div class="info">
    Số lượt: <span id="moves">0</span>
</div>

<button onclick="resetGame()">Reset Game</button>

<div class="game-board" id="board"></div>

<script>

const emojis = ['🍎','🍎','🍌','🍌','🍇','🍇','🍒','🍒'];

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let moves = 0;
let matchedPairs = 0;

const board = document.getElementById("board");

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

function createBoard(){

    board.innerHTML = "";

    shuffle(emojis);

    emojis.forEach(emoji => {

        const card = document.createElement("div");
        card.classList.add("card");

        card.innerHTML = `
        <div class="card-inner">
            <div class="front">?</div>
            <div class="back">${emoji}</div>
        </div>
        `;

        card.dataset.emoji = emoji;

        card.addEventListener("click", flipCard);

        board.appendChild(card);
    });
}

function flipCard(){

    if(lockBoard) return;

    if(this === firstCard) return;

    this.classList.add("flip");

    if(!firstCard){
        firstCard = this;
        return;
    }

    secondCard = this;

    moves++;
    document.getElementById("moves").textContent = moves;

    checkMatch();
}

function checkMatch(){

    let isMatch =
    firstCard.dataset.emoji === secondCard.dataset.emoji;

    if(isMatch){
        disableCards();

        matchedPairs++;

        if(matchedPairs === 4){
            setTimeout(()=>{
                alert("🎉 Chúc mừng! Bạn đã thắng!");
            },300);
        }
    }else{
        unflipCards();
    }
}

function disableCards(){

    firstCard.removeEventListener("click", flipCard);
    secondCard.removeEventListener("click", flipCard);

    resetTurn();
}

function unflipCards(){

    lockBoard = true;

    setTimeout(() => {

        firstCard.classList.remove("flip");
        secondCard.classList.remove("flip");

        resetTurn();

    },1000);
}

function resetTurn(){
    [firstCard, secondCard] = [null, null];
    lockBoard = false;
}

function resetGame(){

    moves = 0;
    matchedPairs = 0;

    document.getElementById("moves").textContent = moves;

    firstCard = null;
    secondCard = null;
    lockBoard = false;

    createBoard();
}

createBoard();

</script>

</body>
</html>
